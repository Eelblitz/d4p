services:
  - type: web
    name: dm4price-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: dm4price-db
          property: connectionString

databases:
  - name: dm4price-db
    plan: free
    databaseName: dm4price
    user: dm4price
